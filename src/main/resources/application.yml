server:
  port: 9001
spring:
  application:
    name: credit-analysis

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/creditdb}
      uuid-representation: standard

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          clientApiClient:
            connectTimeout: 3000
            readTimeout: 500
            loggerLevel: BASIC

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        # Erros de negócio 4xx do downstream não devem abrir o circuito
        ignore-exceptions:
          - feign.FeignException$FeignClientException
  timelimiter:
    configs:
      default:
        timeout-duration: 4s

client:
  api:
    url: http://localhost:8080/v1.0/clients
